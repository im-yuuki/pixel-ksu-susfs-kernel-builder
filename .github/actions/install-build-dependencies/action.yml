name: Install Build Dependencies
description: Install packages required for the Pixel kernel build.

runs:
  using: composite
  steps:
    - name: Install packages
      shell: bash
      run: |
        set -euxo pipefail
        export DEBIAN_FRONTEND=noninteractive

        apt-get update
        apt-get install -y --no-install-recommends \
          android-tools-adb \
          android-tools-fastboot \
          bc \
          bison \
          build-essential \
          ca-certificates \
          cpio \
          curl \
          device-tree-compiler \
          dos2unix \
          dwarves \
          erofs-utils \
          flex \
          git \
          git-lfs \
          kmod \
          libarchive-tools \
          libelf-dev \
          libgl1-mesa-dev \
          libncurses-dev \
          libssl-dev \
          libx11-dev \
          libxml2-utils \
          lz4 \
          openjdk-17-jdk-headless \
          openssl \
          p7zip-full \
          perl \
          python3 \
          python3-markdown \
          python3-pip \
          python-is-python3 \
          repo \
          rsync \
          unzip \
          xz-utils \
          zip \
          zlib1g-dev \
          zstd
