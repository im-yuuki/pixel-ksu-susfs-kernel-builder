name: Sync Kernel Source
description: Download the Google manifest and sync the matching kernel source tree.

inputs:
  build-number:
    description: Numeric Google kernel build number.
    required: true
  kernel-source-dir:
    description: Directory where the kernel source will be synced.
    required: true
  manifest-branch:
    description: Kernel manifest branch used for repo init.
    required: true

runs:
  using: composite
  steps:
    - name: Download manifest
      shell: bash
      env:
        BUILD_NUMBER: ${{ inputs.build-number }}
      run: |
        set -euxo pipefail

        manifest_page_url="https://ci.android.com/builds/submitted/${BUILD_NUMBER}/kernel_aarch64/latest/manifest_${BUILD_NUMBER}.xml"
        manifest_page="manifest_${BUILD_NUMBER}.html"
        artifact_url_file="manifest_${BUILD_NUMBER}.url"
        manifest_file="manifest_${BUILD_NUMBER}.xml"

        curl --fail --location --retry 5 --retry-delay 10 \
          --output "$manifest_page" \
          "$manifest_page_url"

        python3 - "$manifest_page" > "$artifact_url_file" <<'PY'
        import json
        import re
        import sys

        page = open(sys.argv[1], encoding="utf-8").read()
        match = re.search(r"var JSVariables = (\{.*?\});", page, re.S)
        if not match:
            print("Unable to find artifactUrl in Android CI artifact page", file=sys.stderr)
            sys.exit(1)

        data = json.loads(match.group(1))
        artifact_url = data.get("artifactUrl")
        if not artifact_url:
            print("Android CI artifact page did not include artifactUrl", file=sys.stderr)
            sys.exit(1)

        print(artifact_url)
        PY

        curl --fail --location --retry 5 --retry-delay 10 \
          --output "$manifest_file" \
          "$(< "$artifact_url_file")"

        python3 - "$manifest_file" <<'PY'
        import sys
        import xml.etree.ElementTree as ET

        root = ET.parse(sys.argv[1]).getroot()
        if root.tag != "manifest":
            print(f"Expected manifest root tag, got {root.tag!r}", file=sys.stderr)
            sys.exit(1)
        PY

    - name: Sync source tree
      shell: bash
      env:
        BUILD_NUMBER: ${{ inputs.build-number }}
        KERNEL_SOURCE_DIR: ${{ inputs.kernel-source-dir }}
        MANIFEST_BRANCH: ${{ inputs.manifest-branch }}
      run: |
        set -euxo pipefail

        mkdir "$KERNEL_SOURCE_DIR"
        cd "$KERNEL_SOURCE_DIR"
        repo init -u https://android.googlesource.com/kernel/manifest -b "$MANIFEST_BRANCH" --depth=1
        cp "../manifest_${BUILD_NUMBER}.xml" .repo/manifests/default.xml
        repo sync -c --no-tags -j"$(nproc)"
